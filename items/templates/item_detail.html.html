{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ item.title }}</title>
    <link rel="stylesheet" href="{% static 'items/css/item_detail.css' %}">
</head>
<body>

<h2>{{ item.title }}</h2>

<p><strong>Description:</strong> {{ item.description }}</p>
<p><strong>Type:</strong> {{ item.item_type }}</p>
<p><strong>Posted by:</strong> {{ item.user.username }}</p>

<a href="{% url 'items:home' %}">Back to Home</a>





</body>
<style>
    

        body {
            font-family: Arial;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {

            width: 600px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);

        }

        h2 {

            color: #333;

        }

        .label {

            font-weight: bold;
            margin-top: 10px;

        }

        .value {

            margin-bottom: 15px;

        }

        .btn {

            display: inline-block;
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;

        }

        .btn:hover {

            background: #0056b3;

        }


</style>
</html>
