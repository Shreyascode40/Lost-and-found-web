{% extends "base.html" %}

{% block title %}Claim Item{% endblock %}

{% block content %}

<div style="max-width:600px; margin:auto;">

    <h2>Claim: {{ item.title }}</h2>

    <div style="border:1px solid #ddd; padding:15px; border-radius:10px; margin-bottom:20px;">
        <p><strong>Description:</strong> {{ item.description }}</p>
        <p><strong>Location:</strong> {{ item.location }}</p>
        <p><strong>Date:</strong> {{ item.date }}</p>

        {% if item.image %}
            <img src="{{ item.image.url }}" width="100%" style="border-radius:8px;">
        {% endif %}
    </div>

    <form method="POST">
        {% csrf_token %}

        <label><strong>Why should this item be returned to you?</strong></label>
        <textarea name="message"
                  rows="5"
                  required
                  style="width:100%; padding:10px; margin-top:10px; border-radius:6px;">
        </textarea>

        <button type="submit"
                style="margin-top:15px; padding:8px 15px; background:green; color:white; border:none; border-radius:6px;">
            Send Claim Request
        </button>
    </form>

</div>

{% endblock %}
