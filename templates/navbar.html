{% load static %}
<nav class="navbar">
    <div class="navbar-container">
        <a href="{% if user.is_authenticated %}{% url 'items:home' %}{% else %}{% url 'accounts:login' %}{% endif %}" class="navbar-brand">
            <img src="{% static 'istockphoto-1730149969-612x612.jpg' %}" alt="Logo" class="navbar-logo">
            Lost & Found
        </a>
        
        <div class="navbar-left">
            {% if user.is_authenticated %}
                <a href="{% url 'items:home' %}" class="navbar-link">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="{% url 'items:add_item' %}" class="navbar-link navbar-link--primary">
                    <i class="fas fa-plus"></i> Add Item
                </a>
                <a href="{% url 'claim:claim_list' %}" class="navbar-link">
                    <i class="fas fa-clipboard-list"></i> My Claims
                </a>
            {% endif %}
        </div>
        
        <div class="navbar-right">
            {% if user.is_authenticated %}
                <span class="navbar-username">
                    <i class="fas fa-user"></i> {{ user.username }}
                </span>
                <a href="{% url 'admin_panel:admin_dashboard' %}" class="navbar-link">
                    <i class="fas fa-cog"></i> Admin
                </a>
                <a href="{% url 'accounts:logout' %}" class="navbar-link navbar-link--danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="navbar-link">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="{% url 'accounts:register' %}" class="navbar-link navbar-link--primary">
                    <i class="fas fa-user-plus"></i> Register
                </a>
            {% endif %}
        </div>
    </div>
</nav>
