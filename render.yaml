databases:
  - name: lostfound_db
    databaseName: lostfound
    user: lostfound_user

services:
  - type: web
    name: lostfound
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn lostfound_project.wsgi --log-file -"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lostfound_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: WEB_CONCURRENCY
        value: "4"
