<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #17171f;
      --border: #2a2a38;
      --accent: #7c6dfa;
      --accent2: #f7a046;
      --accent3: #4ecdc4;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #ff6b6b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* NAV */
    nav {
      width: 220px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.2rem;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      overflow-y: auto;
    }

    nav .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    nav ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }

    nav ul li a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    nav ul li a:hover {
      background: rgba(124, 109, 250, 0.12);
      color: var(--accent);
    }

    nav ul li.active a {
      background: rgba(124, 109, 250, 0.18);
      color: var(--accent);
    }

    nav ul li.logout { margin-top: auto; }
    nav ul li.logout a { color: var(--danger); }
    nav ul li.logout a:hover { background: rgba(255, 107, 107, 0.12); }

    /* MAIN */
    #main {
      flex: 1;
      height: 100vh;
      padding: 2.5rem;
      overflow-y: auto;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 0.3rem;
    }

    /* STAT CARDS */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .dashboard > div {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .dashboard > div::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }

    #total::before   { background: var(--accent); }
    #claimed::before { background: var(--accent3); }
    #pending::before { background: var(--accent2); }

    .dashboard h3 {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .dashboard h2 {
      font-family: 'DM Mono', monospace;
      font-size: 2.8rem;
      font-weight: 500;
      line-height: 1;
    }

    #total h2   { color: var(--accent); }
    #claimed h2 { color: var(--accent3); }
    #pending h2 { color: var(--accent2); }

    /* GRAPH */
    .graph {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.8rem;
    }

    .graph-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .graph-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .legend {
      display: flex;
      gap: 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
        height: auto;
        overflow: auto;
      }
      nav {
        width: 100%;
        height: auto;
        position: relative;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 1rem;
      }
      nav ul { flex-direction: row; flex-wrap: wrap; }
      #main { height: auto; overflow-y: visible; }
      .dashboard { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">⬡ Vaultex</div>
    <ul>
      <li class="active">
        <a href="#">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
      </li>
      <li>
        <a href="#">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Claims
        </a>
      </li>
      <li>
        <a href="#">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Payouts
        </a>
      </li>
      <li>
        <a href="#">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
        </a>
      </li>
      <li>
        <a href="#">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Settings
        </a>
      </li>
      <li class="logout">
        <a href="#">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </li>
    </ul>
  </nav>

  <div id="main">
    <div class="page-header">
      <h1>Overview</h1>
      <p>Welcome back — here's what's happening today.</p>
    </div>

    <div class="dashboard">
      <div id="total">
        <h3>Total Rewards</h3>
        <h2>$84,210</h2>
      </div>
      <div id="claimed">
        <h3>Claimed</h3>
        <h2>$61,430</h2>
      </div>
      <div id="pending">
        <h3>Pending</h3>
        <h2>$22,780</h2>
      </div>
    </div>

    <div class="graph">
      <div class="graph-header">
        <h2>Rewards Over Time</h2>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background: #7c6dfa;"></div>
            Total
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #4ecdc4;"></div>
            Claimed
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #f7a046;"></div>
            Pending
          </div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="rewardsChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('rewardsChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug'],
        datasets: [
          {
            label: 'Total',
            data: [9200, 11400, 10800, 13500, 12100, 14700, 8900, 10200],
            backgroundColor: 'rgba(124, 109, 250, 0.7)',
            borderRadius: 6,
          },
          {
            label: 'Claimed',
            data: [6800, 8200, 7900, 9800, 8700, 10900, 6100, 7500],
            backgroundColor: 'rgba(78, 205, 196, 0.7)',
            borderRadius: 6,
          },
          {
            label: 'Pending',
            data: [2400, 3200, 2900, 3700, 3400, 3800, 2800, 2700],
            backgroundColor: 'rgba(247, 160, 70, 0.7)',
            borderRadius: 6,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            grid: { color: 'rgba(42,42,56,0.8)' },
            ticks: { color: '#6b6b80', font: { family: 'DM Mono', size: 11 } }
          },
          y: {
            grid: { color: 'rgba(42,42,56,0.8)' },
            ticks: {
              color: '#6b6b80',
              font: { family: 'DM Mono', size: 11 },
              callback: v => '$' + (v/1000).toFixed(0) + 'k'
            }
          }
        }
      }
    });
  </script>

</body>
</html>
