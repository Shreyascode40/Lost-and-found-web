{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Institution Admin Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{% static 'admin_panel/admin_login.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="admin-login-body">

<div class="login-container">

    <div class="login-card shadow">

        <div class="login-header text-center">

            <i class="fas fa-user-shield login-icon"></i>

            <h3>Institution Admin Login</h3>

            <p class="text-muted">
                Access your institution dashboard
            </p>

        </div>

        <!-- Error Message -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary w-100">

                <i class="fas fa-sign-in-alt"></i>
                Login as Admin

            </button>

        </form>

        <hr>

        <div class="text-center">

            <small>
                Not an admin?
                <a href="{% url 'accounts:login' %}">
                    Student Login
                </a>
            </small>

        </div>

    </div>

</div>

</body>
</html>
