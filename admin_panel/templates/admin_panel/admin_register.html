{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Admin Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f0f13 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: #17171f;
            border: 1px solid #2a2a38;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #7c6dfa, #f7a046, #4ecdc4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #7c6dfa, #5a4fcf);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(124, 109, 250, 0.3);
        }

        .auth-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #e8e8f0;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #6b6b80;
            font-size: 0.9rem;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e8e8f0;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group label i {
            color: #7c6dfa;
            width: 16px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: #0f0f13;
            border: 1px solid #2a2a38;
            border-radius: 10px;
            color: #e8e8f0;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #7c6dfa;
            box-shadow: 0 0 0 3px rgba(124, 109, 250, 0.15);
        }

        .form-control::placeholder {
            color: #4a4a5a;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c6dfa, #5a4fcf);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 109, 250, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #2a2a38;
        }

        .auth-footer p {
            color: #6b6b80;
            font-size: 0.85rem;
        }

        .auth-footer a {
            color: #7c6dfa;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b6b80;
        }

        .input-icon .form-control {
            padding-left: 42px;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-university"></i>
                </div>
                <h1>Register Institution</h1>
                <p>Create your institution admin account</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>
                        <i class="fas fa-university"></i> Institution Name
                    </label>
                    <input type="text" 
                           name="institution_name" 
                           class="form-control" 
                           placeholder="Enter institution name" 
                           required>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i> Admin Username
                    </label>
                    <input type="text" 
                           name="username" 
                           class="form-control" 
                           placeholder="Choose admin username" 
                           required>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="Create password" 
                           required>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input type="password" 
                           name="confirm_password" 
                           class="form-control" 
                           placeholder="Confirm password" 
                           required>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus"></i>
                    Create Admin Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="{% url 'admin_panel:admin_login' %}">Login here</a></p>
            </div>
        </div>
    </div>

</body>
</html>
